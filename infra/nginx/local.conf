# userepro: local userepro.test, cloud userepro.dev

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

proxy_connect_timeout 60s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;
proxy_buffering       on;
proxy_buffer_size     16k;
proxy_buffers         8 16k;
proxy_busy_buffers_size 32k;

# --- api.userepro.test (:5000) ---
server {
    listen 443 ssl;
    server_name api.userepro.test;

    ssl_certificate     /etc/ssl/certs/userepro.test.pem;
    ssl_certificate_key /etc/ssl/private/userepro.test-key.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}


