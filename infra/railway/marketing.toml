# Railway config-as-code — marketing service
# UI: Settings → Config file path = /infra/railway/marketing.toml
# Root Directory = / (repo root)
# Networking: nginx now listens on Railway's injected $PORT (NGINX_ENVSUBST_FILTER=PORT) — no manual target-port step needed

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/marketing/Dockerfile"
watchPatterns = [
  "/apps/marketing/**",
  "/apps/marketing/Dockerfile",
  "/apps/marketing/nginx.conf",
  "/packages/env/**",
  "/packages/config/**",
  "/infra/railway/marketing.toml",
  "/package.json",
  "/bun.lock",
  "/turbo.json",
]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
drainingSeconds = 5
overlapSeconds = 10
multiRegionConfig = { "asia-southeast1-eqsg3a" = { numReplicas = 1 } }
