# Railway config-as-code — docs service
# UI: Settings → Config file path = /infra/railway/docs.toml
# Root Directory = / (repo root)

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/docs/Dockerfile"
watchPatterns = [
  "/apps/docs/**",
  "/apps/docs/Dockerfile",
  "/packages/env/**",
  "/packages/config/**",
  "/infra/railway/docs.toml",
  "/package.json",
  "/bun.lock",
  "/turbo.json",
]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
drainingSeconds = 15
overlapSeconds = 20
multiRegionConfig = { "asia-southeast1-eqsg3a" = { numReplicas = 1 } }
