# Railway config-as-code — api service
# UI: Settings → Config file path = /infra/railway/api.toml
# Root Directory = / (repo root)

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
watchPatterns = [
  "/apps/api/**",
  "/apps/api/Dockerfile",
  "/packages/auth/**",
  "/packages/db/**",
  "/packages/env/**",
  "/packages/config/**",
  "/infra/railway/api.toml",
  "/package.json",
  "/bun.lock",
  "/turbo.json",
]

[deploy]
preDeployCommand = ["cd /app && bun run db:migrate"]
healthcheckPath = "/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
drainingSeconds = 20
overlapSeconds = 30
multiRegionConfig = { "asia-southeast1-eqsg3a" = { numReplicas = 1 } }
